<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>廣東話發音遊戲 | Cantonese Speech Game</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+HK:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-main: #FFF8E7;
  --bg-card: #FFFFFF;
  --color-kh: #FF6B8A;
  --color-kh-light: #FFF0F3;
  --color-w: #4ECDC4;
  --color-w-light: #E8FBF9;
  --color-star: #FFD93D;
  --color-text: #2D1B4E;
  --color-text-light: #7B6B8D;
  --color-success: #6BCB77;
  --shadow-card: 0 8px 24px rgba(45, 27, 78, 0.12);
  --shadow-pop: 0 12px 32px rgba(45, 27, 78, 0.2);
  --radius: 24px;
}

.dark {
  --bg-main: #1A1030;
  --bg-card: #2D1F4E;
  --color-kh-light: #3D1525;
  --color-w-light: #152D2A;
  --color-text: #F0E6FF;
  --color-text-light: #A99BBF;
  --shadow-card: 0 8px 24px rgba(0,0,0,0.3);
  --shadow-pop: 0 12px 32px rgba(0,0,0,0.45);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans HK', 'Nunito', sans-serif;
  background: var(--bg-main);
  color: var(--color-text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-user-select: none;
  user-select: none;
}

/* Background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,107,138,0.1) 0%, transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(78,205,196,0.1) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255,217,61,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.dark body::before {
  background:
    radial-gradient(circle at 15% 20%, rgba(255,107,138,0.06) 0%, transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(78,205,196,0.06) 0%, transparent 40%);
}

/* ========== SCREENS ========== */
.screen { display: none; position: relative; z-index: 1; min-height: 100vh; padding: 20px; }
.screen.active { display: flex; flex-direction: column; align-items: center; }

/* ========== WELCOME SCREEN ========== */
#welcome { justify-content: center; gap: 24px; text-align: center; }

.welcome-mascot {
  width: 160px; height: 160px;
  animation: mascotBounce 2s ease-in-out infinite;
}

@keyframes mascotBounce {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-12px) rotate(2deg); }
}

.welcome-title {
  font-size: 32px; font-weight: 900;
  background: linear-gradient(135deg, var(--color-kh), #FF9A5C, var(--color-w));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.3;
}

.welcome-sub {
  font-size: 16px; color: var(--color-text-light);
  font-weight: 700; max-width: 300px;
}

.btn-start {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 18px 40px; border: none; border-radius: 50px;
  font-size: 22px; font-weight: 900; cursor: pointer;
  color: #fff; background: linear-gradient(135deg, var(--color-kh), #FF9A5C);
  box-shadow: 0 8px 20px rgba(255,107,138,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
  font-family: inherit;
  animation: pulseBtn 2.5s ease-in-out infinite;
}

.btn-start:active {
  transform: scale(0.95);
  box-shadow: 0 4px 12px rgba(255,107,138,0.25);
}

@keyframes pulseBtn {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

.parent-note {
  font-size: 12px; color: var(--color-text-light);
  max-width: 320px; line-height: 1.6;
  background: var(--bg-card); padding: 16px; border-radius: 16px;
  box-shadow: var(--shadow-card);
}

/* ========== CATEGORY SCREEN ========== */
#categories { justify-content: center; gap: 20px; }

.cat-title {
  font-size: 26px; font-weight: 900; text-align: center;
}

.cat-grid { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }

.cat-card {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 24px; border-radius: var(--radius);
  background: var(--bg-card); box-shadow: var(--shadow-card);
  cursor: pointer; border: 3px solid transparent;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}

.cat-card:active { transform: scale(0.97); }
.cat-card[data-cat="kh"]:hover, .cat-card[data-cat="kh"]:active { border-color: var(--color-kh); }
.cat-card[data-cat="w"]:hover, .cat-card[data-cat="w"]:active { border-color: var(--color-w); }

.cat-icon {
  width: 60px; height: 60px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
}

.cat-card[data-cat="kh"] .cat-icon { background: var(--color-kh-light); }
.cat-card[data-cat="w"] .cat-icon { background: var(--color-w-light); }

.cat-info h3 { font-size: 20px; font-weight: 900; }
.cat-info p { font-size: 13px; color: var(--color-text-light); font-weight: 700; }

.cat-stars {
  margin-left: auto; display: flex; gap: 2px; font-size: 16px;
}

/* ========== GAME SCREEN ========== */
#game { gap: 16px; padding-top: 12px; }

.game-header {
  width: 100%; max-width: 400px;
  display: flex; align-items: center; justify-content: space-between;
}

.btn-back {
  width: 44px; height: 44px; border-radius: 14px;
  background: var(--bg-card); border: none;
  box-shadow: var(--shadow-card); cursor: pointer;
  font-size: 20px; display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
}
.btn-back:active { transform: scale(0.9); }

.game-progress {
  display: flex; gap: 6px; align-items: center;
}

.progress-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--bg-card); box-shadow: inset 0 0 0 2px var(--color-text-light);
  transition: all 0.4s;
}

.progress-dot.done { background: var(--color-star); box-shadow: 0 2px 8px rgba(255,217,61,0.5); }
.progress-dot.current { transform: scale(1.3); box-shadow: inset 0 0 0 3px var(--color-kh); }
.progress-dot.current-w { box-shadow: inset 0 0 0 3px var(--color-w); }

.star-count {
  font-size: 18px; font-weight: 900;
  display: flex; align-items: center; gap: 4px;
}

/* Card area */
.card-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  width: 100%; max-width: 400px;
}

.word-card {
  width: 100%; max-width: 320px; aspect-ratio: 3/4;
  background: var(--bg-card); border-radius: 28px;
  box-shadow: var(--shadow-pop);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; padding: 24px; cursor: pointer;
  transition: transform 0.3s;
  position: relative; overflow: hidden;
}

.word-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 6px; border-radius: 28px 28px 0 0;
}

.word-card.kh-card::before { background: linear-gradient(90deg, var(--color-kh), #FF9A5C); }
.word-card.w-card::before { background: linear-gradient(90deg, var(--color-w), #45B7AA); }

.word-card:active { transform: scale(0.97); }

.card-illustration {
  width: 140px; height: 140px;
  display: flex; align-items: center; justify-content: center;
}

.card-character {
  font-size: 80px; font-weight: 900;
  line-height: 1;
}

.kh-card .card-character { color: var(--color-kh); }
.w-card .card-character { color: var(--color-w); }

.card-jyutping {
  font-family: 'Nunito', sans-serif;
  font-size: 22px; font-weight: 800;
  color: var(--color-text-light);
}

.card-meaning {
  font-size: 14px; font-weight: 700;
  color: var(--color-text-light);
  text-align: center;
}

.card-prompt {
  font-size: 18px; font-weight: 800;
  padding: 10px 28px; border-radius: 50px;
  animation: promptPulse 1.5s ease-in-out infinite;
}

.kh-card .card-prompt { background: var(--color-kh-light); color: var(--color-kh); }
.w-card .card-prompt { background: var(--color-w-light); color: var(--color-w); }

@keyframes promptPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* Action buttons */
.card-actions {
  width: 100%; max-width: 320px;
  display: flex; gap: 12px; justify-content: center;
  padding-bottom: 20px;
}

.btn-action {
  flex: 1; padding: 16px; border: none; border-radius: 18px;
  font-size: 17px; font-weight: 800; cursor: pointer;
  font-family: inherit;
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-action:active { transform: scale(0.95); }

.btn-listen {
  background: var(--bg-card); color: var(--color-text);
  box-shadow: var(--shadow-card);
}

.btn-done {
  color: #fff;
  box-shadow: 0 6px 16px rgba(107,203,119,0.35);
  background: linear-gradient(135deg, var(--color-success), #4CAF50);
}

.btn-repeat {
  background: var(--bg-card); color: var(--color-text);
  box-shadow: var(--shadow-card);
}

/* ========== CELEBRATION ========== */
#celebration { justify-content: center; gap: 24px; text-align: center; }

.celeb-stars {
  font-size: 48px;
  animation: celebBounce 0.6s ease-out;
}

@keyframes celebBounce {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

.celeb-title {
  font-size: 36px; font-weight: 900;
  background: linear-gradient(135deg, var(--color-star), #FF9A5C, var(--color-kh));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.celeb-message {
  font-size: 18px; font-weight: 700;
  color: var(--color-text-light);
  max-width: 300px;
}

.btn-again {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 18px 36px; border: none; border-radius: 50px;
  font-size: 20px; font-weight: 900; cursor: pointer;
  color: #fff; background: linear-gradient(135deg, var(--color-w), #45B7AA);
  box-shadow: 0 8px 20px rgba(78,205,196,0.35);
  font-family: inherit;
  transition: transform 0.2s;
}

.btn-again:active { transform: scale(0.95); }

/* ========== FLOATING STARS ========== */
.floating-star {
  position: fixed; pointer-events: none; z-index: 100;
  font-size: 32px;
  animation: floatUp 1.2s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(0.5) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-160px) scale(1.2) rotate(30deg); }
}

/* ========== CONFETTI ========== */
.confetti-piece {
  position: fixed; z-index: 99; pointer-events: none;
  width: 10px; height: 10px; border-radius: 2px;
}

@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

/* ========== SOUND WAVE ========== */
.sound-wave {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; height: 30px;
}

.sound-bar {
  width: 5px; border-radius: 3px;
  animation: soundWave 0.8s ease-in-out infinite;
}

.kh-card .sound-bar { background: var(--color-kh); }
.w-card .sound-bar { background: var(--color-w); }

.sound-bar:nth-child(1) { height: 10px; animation-delay: 0s; }
.sound-bar:nth-child(2) { height: 20px; animation-delay: 0.1s; }
.sound-bar:nth-child(3) { height: 28px; animation-delay: 0.2s; }
.sound-bar:nth-child(4) { height: 20px; animation-delay: 0.3s; }
.sound-bar:nth-child(5) { height: 10px; animation-delay: 0.4s; }

@keyframes soundWave {
  0%, 100% { transform: scaleY(0.5); }
  50% { transform: scaleY(1.2); }
}

.sound-wave-hidden .sound-bar { animation: none; transform: scaleY(0.3); opacity: 0.3; }

/* ========== RESPONSIVE ========== */
@media (max-width: 380px) {
  .welcome-title { font-size: 26px; }
  .card-character { font-size: 64px; }
  .word-card { max-width: 280px; }
  .card-illustration { width: 120px; height: 120px; }
}

@media (min-height: 800px) {
  .word-card { max-width: 340px; }
  .card-illustration { width: 160px; height: 160px; }
}

/* Tap hint animation */
.tap-hint {
  position: absolute; bottom: 20px;
  font-size: 13px; font-weight: 700; color: var(--color-text-light);
  animation: tapFade 2s ease-in-out infinite;
}

@keyframes tapFade {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}
</style>
</head>
<body>

<!-- ====== WELCOME SCREEN ====== -->
<div id="welcome" class="screen active">
  <svg class="welcome-mascot" viewBox="0 0 160 160">
    <!-- Cute penguin (企鵝) mascot -->
    <ellipse cx="80" cy="110" rx="50" ry="45" fill="#2D1B4E"/>
    <ellipse cx="80" cy="108" rx="35" ry="32" fill="#F0E6FF"/>
    <circle cx="65" cy="90" r="7" fill="#2D1B4E"/>
    <circle cx="95" cy="90" r="7" fill="#2D1B4E"/>
    <circle cx="67" cy="88" r="2.5" fill="#FFF"/>
    <circle cx="97" cy="88" r="2.5" fill="#FFF"/>
    <ellipse cx="80" cy="102" rx="8" ry="5" fill="#FF9A5C"/>
    <ellipse cx="42" cy="110" rx="14" ry="8" fill="#2D1B4E" transform="rotate(-15 42 110)"/>
    <ellipse cx="118" cy="110" rx="14" ry="8" fill="#2D1B4E" transform="rotate(15 118 110)"/>
    <ellipse cx="70" cy="152" rx="12" ry="6" fill="#FF9A5C"/>
    <ellipse cx="90" cy="152" rx="12" ry="6" fill="#FF9A5C"/>
    <!-- Crown/party hat -->
    <polygon points="80,30 68,60 92,60" fill="var(--color-star)"/>
    <circle cx="80" cy="30" r="6" fill="var(--color-kh)"/>
    <circle cx="72" cy="50" r="3" fill="var(--color-w)"/>
    <circle cx="88" cy="50" r="3" fill="#FF9A5C"/>
  </svg>

  <h1 class="welcome-title">廣東話<br>發音遊戲</h1>
  <p class="welcome-sub">同企鵝仔一齊學講嘢！🎉</p>

  <button class="btn-start" id="btnStart" type="button">
    開始玩 ▶
  </button>

  <div class="parent-note">
    👨‍👩‍👧 <strong>家長提示：</strong>請陪同小朋友一齊玩，鼓勵佢哋跟住讀每個字。按下「聽」可以示範讀音，小朋友試讀完就按「叻叻」畀星星佢哋！
  </div>
</div>

<!-- ====== CATEGORY SCREEN ====== -->
<div id="categories" class="screen">
  <h2 class="cat-title">揀一組聲音練習</h2>

  <div class="cat-grid">
    <div class="cat-card" data-cat="kh" id="catKh">
      <div class="cat-icon">
        <svg viewBox="0 0 60 60" width="44" height="44">
          <rect x="18" y="15" width="24" height="32" rx="4" fill="var(--color-kh)"/>
          <rect x="24" y="10" width="12" height="8" rx="3" fill="var(--color-kh)"/>
          <circle cx="26" cy="27" r="2.5" fill="#FFF"/>
          <circle cx="34" cy="27" r="2.5" fill="#FFF"/>
          <path d="M26 34 Q30 38 34 34" stroke="#FFF" fill="none" stroke-width="2" stroke-linecap="round"/>
          <rect x="22" y="47" width="6" height="6" rx="2" fill="var(--color-kh)"/>
          <rect x="32" y="47" width="6" height="6" rx="2" fill="var(--color-kh)"/>
        </svg>
      </div>
      <div class="cat-info">
        <h3>Kh 聲母</h3>
        <p>企 茄 旗 奇 琴 橋</p>
      </div>
      <div class="cat-stars" id="khStars"></div>
    </div>

    <div class="cat-card" data-cat="w" id="catW">
      <div class="cat-icon">
        <svg viewBox="0 0 60 60" width="44" height="44">
          <path d="M10 28 Q10 44 30 44 Q50 44 50 28" fill="none" stroke="var(--color-w)" stroke-width="5" stroke-linecap="round"/>
          <circle cx="22" cy="34" r="2" fill="var(--color-w)"/>
          <circle cx="38" cy="34" r="2" fill="var(--color-w)"/>
          <path d="M8 26 Q30 16 52 26" fill="none" stroke="var(--color-w)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
        </svg>
      </div>
      <div class="cat-info">
        <h3>W 聲母</h3>
        <p>碗 滑 玩 蛙</p>
      </div>
      <div class="cat-stars" id="wStars"></div>
    </div>
  </div>

  <button class="btn-back" id="btnBackFromCat" type="button" style="margin-top: 16px;">🏠</button>
</div>

<!-- ====== GAME SCREEN ====== -->
<div id="game" class="screen">
  <div class="game-header">
    <button class="btn-back" id="btnBackFromGame" type="button">◀</button>
    <div class="game-progress" id="progressDots"></div>
    <div class="star-count" id="starCount">⭐ 0</div>
  </div>

  <div class="card-area">
    <div class="word-card" id="wordCard">
      <div class="card-illustration" id="cardIllustration"></div>
      <div class="card-character" id="cardChar"></div>
      <div class="card-jyutping" id="cardJyutping"></div>
      <div class="card-meaning" id="cardMeaning"></div>
      <div class="sound-wave sound-wave-hidden" id="soundWave">
        <div class="sound-bar"></div>
        <div class="sound-bar"></div>
        <div class="sound-bar"></div>
        <div class="sound-bar"></div>
        <div class="sound-bar"></div>
      </div>
      <div class="card-prompt" id="cardPrompt">👄 跟住讀！</div>
      <div class="tap-hint" id="tapHint">輕按卡片聽讀音</div>
    </div>
  </div>

  <div class="card-actions">
    <button class="btn-action btn-listen" id="btnListen" type="button">🔊 聽</button>
    <button class="btn-action btn-done" id="btnDone" type="button">⭐ 叻叻！</button>
    <button class="btn-action btn-repeat" id="btnRepeat" type="button">🔁 再嚟</button>
  </div>
</div>

<!-- ====== CELEBRATION SCREEN ====== -->
<div id="celebration" class="screen">
  <div class="celeb-stars" id="celebStarsDisplay"></div>
  <h2 class="celeb-title" id="celebTitle"></h2>
  <p class="celeb-message" id="celebMsg"></p>
  <button class="btn-again" id="btnAgain" type="button">🎮 繼續練習</button>
</div>

<script>
/* ============================================
   CANTONESE SPEECH THERAPY GAME
   Target sounds: Kh (溪母) and W
   ============================================ */

// Dark mode detection
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.classList.add('dark');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
  if (event.matches) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
});

// ============ WORD DATA ============
var WORDS = {
  kh: [
    {
      char: '企',
      jyutping: 'kéi5',
      meaning: '企鵝 (Penguin) 🐧',
      syllable: 'kéi',
      svgIcon: function() {
        return '<svg viewBox="0 0 140 140"><ellipse cx="70" cy="85" rx="38" ry="42" fill="#2D1B4E"/><ellipse cx="70" cy="83" rx="26" ry="28" fill="#E8E0F0"/><circle cx="58" cy="72" r="5" fill="#2D1B4E"/><circle cx="82" cy="72" r="5" fill="#2D1B4E"/><circle cx="60" cy="70.5" r="2" fill="#FFF"/><circle cx="84" cy="70.5" r="2" fill="#FFF"/><ellipse cx="70" cy="82" rx="6" ry="4" fill="#FF9A5C"/><rect x="58" y="125" width="10" height="8" rx="3" fill="#FF9A5C"/><rect x="72" y="125" width="10" height="8" rx="3" fill="#FF9A5C"/></svg>';
      }
    },
    {
      char: '茄',
      jyutping: 'ké4',
      meaning: '茄子 (Eggplant) 🍆',
      syllable: 'ké',
      svgIcon: function() {
        return '<svg viewBox="0 0 140 140"><ellipse cx="70" cy="88" rx="28" ry="42" fill="#7B2D8E"/><path d="M60 48 Q70 28 80 48" fill="#4CAF50" stroke="#388E3C" stroke-width="2"/><rect x="67" y="28" width="6" height="18" rx="3" fill="#4CAF50"/><circle cx="58" cy="80" r="4" fill="#9C4DCC" opacity="0.5"/><circle cx="78" cy="95" r="3" fill="#9C4DCC" opacity="0.4"/></svg>';
      }
    },
    {
      char: '旗',
      jyutping: 'kèi4',
      meaning: '旗 (Flag) 🚩',
      syllable: 'kèi',
      svgIcon: function() {
        return '<svg viewBox="0 0 140 140"><rect x="35" y="25" width="6" height="100" rx="3" fill="#8B7355"/><rect x="41" y="25" width="65" height="45" rx="6" fill="#FF6B8A"/><rect x="41" y="25" width="65" height="15" rx="0" fill="#FF9A5C"/><circle cx="73" cy="52" r="8" fill="#FFD93D"/></svg>';
      }
    },
    {
      char: '奇',
      jyutping: 'kèi4',
      meaning: '奇怪 (Strange) ✨',

// ============ GAME STATE ============
var state = {
  currentCategory: null,
  currentIndex: 0,
  stars: { kh: 0, w: 0 },
  completedWords: { kh: [], w: [] },
  wordOrder: [],
  isSpeaking: false
};

// ============ AUDIO (Web Audio API) ============
var audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(freq, duration, type) {
  try {
    var ctx = getAudioCtx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (duration || 0.3));
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + (duration || 0.3));
  } catch (e) {
    // Audio not available
  }
}

function playHappySound() {
  playTone(523, 0.12, 'sine');
  setTimeout(function() { playTone(659, 0.12, 'sine'); }, 120);
  setTimeout(function() { playTone(784, 0.2, 'sine'); }, 240);
}

function playCelebSound() {
  var notes = [523, 587, 659, 784, 880, 1047];
  notes.forEach(function(n, i) {
    setTimeout(function() { playTone(n, 0.15, 'sine'); }, i * 100);
  });
}

function playTapSound() {
  playTone(440, 0.08, 'triangle');
}

// ============ SPEECH SYNTHESIS ============
function speakCantonese(text) {
  if (state.isSpeaking) return;
  state.isSpeaking = true;

  var wave = document.getElementById('soundWave');
  if (wave) wave.classList.remove('sound-wave-hidden');

  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'zh-HK';
    utter.rate = 0.7;
    utter.pitch = 1.1;

    // Try to find Cantonese voice
    var voices = window.speechSynthesis.getVoices();
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang === 'zh-HK' || voices[i].lang.indexOf('yue') !== -1) {
        utter.voice = voices[i];
        break;
      }
    }

    utter.onend = function() {
      state.isSpeaking = false;
      if (wave) wave.classList.add('sound-wave-hidden');
    };

    utter.onerror = function() {
      state.isSpeaking = false;
      if (wave) wave.classList.add('sound-wave-hidden');
    };

    window.speechSynthesis.speak(utter);

    // Fallback timeout
    setTimeout(function() {
      state.isSpeaking = false;
      if (wave) wave.classList.add('sound-wave-hidden');
    }, 3000);
  } else {
    setTimeout(function() {
      state.isSpeaking = false;
      if (wave) wave.classList.add('sound-wave-hidden');
    }, 500);
  }
}

// Load voices
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() {
    window.speechSynthesis.getVoices();
  };
}

// ============ SCREEN NAVIGATION ============
function showScreen(screenId) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) {
    screens[i].classList.remove('active');
  }
  document.getElementById(screenId).classList.add('active');
}

// ============ STAR DISPLAY ============
function updateCategoryStars() {
  var khStars = document.getElementById('khStars');
  var wStars = document.getElementById('wStars');
  var khTotal = WORDS.kh.length;
  var wTotal = WORDS.w.length;

  var khHtml = '';
  for (var i = 0; i < khTotal; i++) {
    khHtml += i < state.stars.kh ? '⭐' : '☆';
  }
  khStars.textContent = khHtml;

  var wHtml = '';
  for (var j = 0; j < wTotal; j++) {
    wHtml += j < state.stars.w ? '⭐' : '☆';
  }
  wStars.textContent = wHtml;
}

// ============ FLOATING STAR EFFECT ============
function spawnFloatingStar(x, y) {
  var star = document.createElement('div');
  star.className = 'floating-star';
  star.textContent = '⭐';
  star.style.left = x + 'px';
  star.style.top = y + 'px';
  document.body.appendChild(star);
  setTimeout(function() { star.remove(); }, 1200);
}

// ============ CONFETTI ============
function spawnConfetti() {
  var colors = ['#FF6B8A', '#4ECDC4', '#FFD93D', '#FF9A5C', '#6BCB77', '#A78BFA'];
  for (var i = 0; i < 40; i++) {
    (function(index) {
      setTimeout(function() {
        var piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = (Math.random() * 100) + 'vw';
        piece.style.top = '-10px';
        piece.style.background = colors[index % colors.length];
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.animation = 'confettiFall ' + (1.5 + Math.random() * 2) + 's ease-out forwards';
        piece.style.animationDelay = (Math.random() * 0.3) + 's';
        document.body.appendChild(piece);
        setTimeout(function() { piece.remove(); }, 4000);
      }, index * 30);
    })(i);
  }
}

// ============ SHUFFLE ARRAY ============
function shuffleArray(arr) {
  var shuffled = arr.slice();
  for (var i = shuffled.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = shuffled[i];
    shuffled[i] = shuffled[j];
    shuffled[j] = temp;
  }
  return shuffled;
}

// ============ START GAME FOR CATEGORY ============
function startCategory(cat) {
  state.currentCategory = cat;
  state.currentIndex = 0;
  state.wordOrder = shuffleArray(WORDS[cat].map(function(_, i) { return i; }));

  var card = document.getElementById('wordCard');
  card.className = 'word-card ' + (cat === 'kh' ? 'kh-card' : 'w-card');

  updateProgressDots();
  showCurrentWord();
  showScreen('game');
}

// ============ PROGRESS DOTS ============
function updateProgressDots() {
  var container = document.getElementById('progressDots');
  var total = state.wordOrder.length;
  var html = '';
  for (var i = 0; i < total; i++) {
    var cls = 'progress-dot';
    if (i < state.currentIndex) cls += ' done';
    if (i === state.currentIndex) {
      cls += ' current';
      if (state.currentCategory === 'w') cls += ' current-w';
    }
    html += '<div class="' + cls + '"></div>';
  }
  container.innerHTML = html;

  document.getElementById('starCount').textContent = '⭐ ' + state.stars[state.currentCategory];
}

// ============ SHOW CURRENT WORD ============
function showCurrentWord() {
  if (state.currentIndex >= state.wordOrder.length) {
    showCelebration();
    return;
  }

  var wordIdx = state.wordOrder[state.currentIndex];
  var word = WORDS[state.currentCategory][wordIdx];

  document.getElementById('cardIllustration').innerHTML = word.svgIcon();
  document.getElementById('cardChar').textContent = word.char;
  document.getElementById('cardJyutping').textContent = word.jyutping;
  document.getElementById('cardMeaning').textContent = word.meaning;
  document.getElementById('cardPrompt').textContent = '👄 跟住讀！';
  document.getElementById('tapHint').textContent = '輕按卡片聽讀音';

  // Animate in
  var card = document.getElementById('wordCard');
  card.style.transform = 'scale(0.9) translateY(20px)';
  card.style.opacity = '0';
  setTimeout(function() {
    card.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s';
    card.style.transform = 'scale(1) translateY(0)';
    card.style.opacity = '1';
  }, 50);

  updateProgressDots();
}

// ============ MARK WORD DONE ============
function markCurrentDone(event) {
  playHappySound();

  var cat = state.currentCategory;
  var wordIdx = state.wordOrder[state.currentIndex];

  if (state.completedWords[cat].indexOf(wordIdx) === -1) {
    state.completedWords[cat].push(wordIdx);
    state.stars[cat]++;
  }

  // Spawn stars
  var rect;
  if (event) {
    rect = { x: event.clientX || event.touches && event.touches[0] && event.touches[0].clientX || window.innerWidth / 2,
             y: event.clientY || event.touches && event.touches[0] && event.touches[0].clientY || window.innerHeight / 2 };
  } else {
    rect = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
  }
  for (var i = 0; i < 3; i++) {
    (function(idx) {
      setTimeout(function() {
        spawnFloatingStar(rect.x - 16 + (idx - 1) * 30, rect.y - 20);
      }, idx * 150);
    })(i);
  }

  // Update prompt
  var prompts = ['好叻呀！🌟', '太犀利啦！💪', '勁呀！🎉', '好棒！✨', '你好叻！🏆'];
  document.getElementById('cardPrompt').textContent = prompts[Math.floor(Math.random() * prompts.length)];

  updateProgressDots();

  // Next word after delay
  setTimeout(function() {
    state.currentIndex++;
    showCurrentWord();
  }, 1200);
}

// ============ CELEBRATION ============
function showCelebration() {
  playCelebSound();
  spawnConfetti();

  var cat = state.currentCategory;
  var total = WORDS[cat].length;
  var earned = state.stars[cat];

  var starsHtml = '';
  for (var i = 0; i < earned; i++) { starsHtml += '⭐'; }
  document.getElementById('celebStarsDisplay').textContent = starsHtml || '🌟';

  if (earned === total) {
    document.getElementById('celebTitle').textContent = '全部完成！';
    document.getElementById('celebMsg').textContent = '你已經學識晒所有 ' + (cat === 'kh' ? 'Kh' : 'W') + ' 聲母嘅字啦！繼續加油！';
  } else {
    document.getElementById('celebTitle').textContent = '好叻呀！';
    document.getElementById('celebMsg').textContent = '你攞到 ' + earned + ' 粒星！想唔想再試下攞滿分？';
  }

  showScreen('celebration');
  updateCategoryStars();
}

  playTapSound();
  updateCategoryStars();
  showScreen('categories');
});

  playTapSound();
  startCategory('kh');
});

document.getElementById('catW').addEventListener('click', function() {
  playTapSound();
  startCategory('w');
});

document.getElementById('btnBackFromCat').addEventListener('click', function() {
  playTapSound();
  showScreen('welcome');
});

document.getElementById('btnBackFromGame').addEventListener('click', function() {
  playTapSound();
  updateCategoryStars();
  showScreen('categories');
});

// Listen button - speak the word
document.getElementById('btnListen').addEventListener('click', function() {
  if (state.currentIndex >= state.wordOrder.length) return;
  var wordIdx = state.wordOrder[state.currentIndex];
  var word = WORDS[state.currentCategory][wordIdx];
  speakCantonese(word.char);
});

// Card tap - also speak

  if (state.currentIndex >= state.wordOrder.length) return;
  var wordIdx = state.wordOrder[state.currentIndex];
  var word = WORDS[state.currentCategory][wordIdx];
  speakCantonese(word.char);
});

// Done button
document.getElementById('btnDone').addEventListener('click', function(e) {
  if (state.currentIndex >= state.wordOrder.length) return;
  markCurrentDone(e);
});

// Repeat button
document.getElementById('btnRepeat').addEventListener('click', function() {
  if (state.currentIndex >= state.wordOrder.length) return;
  var wordIdx = state.wordOrder[state.currentIndex];
  var word = WORDS[state.currentCategory][wordIdx];
  speakCantonese(word.char);
  document.getElementById('cardPrompt').textContent = '👄 再讀一次！';
});

// Celebration - play again
document.getElementById('btnAgain').addEventListener('click', function() {
  playTapSound();
  updateCategoryStars();
  showScreen('categories');
});
